name: Assemble API specification

on:
  push:
    branches:
      - feature/docs-project-policy-sync
    paths:
      - .api-upload/trigger

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/docs-project-policy-sync
          fetch-depth: 0
      - name: Decode full API specification
        shell: bash
        run: |
          base64 --decode .api-upload/spec.md.gz.b64 | gzip --decompress > docs/BOBFULL_API_SPEC_COMPLETE.md
          test "$(wc -l < docs/BOBFULL_API_SPEC_COMPLETE.md)" -eq 4881
          grep -q '^# 밥풀 API Specification — 전체 반영본$' docs/BOBFULL_API_SPEC_COMPLETE.md
          test "$(grep -c '^## [0-9]\+-[0-9]\+\.' docs/BOBFULL_API_SPEC_COMPLETE.md)" -eq 87
          ! grep -q '/api/v1' docs/BOBFULL_API_SPEC_COMPLETE.md
          ! grep -q 'paymentOrderId' docs/BOBFULL_API_SPEC_COMPLETE.md
          ! grep -q 'paymentKey' docs/BOBFULL_API_SPEC_COMPLETE.md
      - name: Commit assembled specification
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/BOBFULL_API_SPEC_COMPLETE.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'docs: replace API summary with full specification'
          git push origin HEAD:feature/docs-project-policy-sync
